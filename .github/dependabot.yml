version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/packages/ts"
    schedule:
      interval: "monthly"
    groups:
      production:
        dependency-type: "production"
      dev-dependencies:
        dependency-type: "development"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
