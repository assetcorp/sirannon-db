name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (major, minor, patch, or explicit like 1.2.3)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Release & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build
        run: pnpm nx run sirannon-ts:build

      - name: Test
        run: pnpm nx run sirannon-ts:test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: pnpm nx release ${{ inputs.version }} ${{ inputs.dry-run && '--dry-run' || '' }} --skip-publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: pnpm nx release publish --verbose
        env:
          NPM_CONFIG_PROVENANCE: true
