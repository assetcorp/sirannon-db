name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (major, minor, patch, or explicit like 1.2.3)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Release & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build
        run: pnpm nx run sirannon-ts:build

      - name: Test
        run: pnpm nx run sirannon-ts:test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version
        run: pnpm nx release version ${{ inputs.version }}

      - name: Changelog
        run: pnpm nx release changelog ${{ inputs.version }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: pnpm nx release publish --verbose
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Push tags and changelog
        if: ${{ !inputs.dry-run }}
        run: git push --follow-tags
