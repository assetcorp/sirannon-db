name: Replication Soak

on:
  workflow_dispatch:
    inputs:
      duration_ms:
        description: Soak test duration in milliseconds
        required: false
        default: '600000'
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

concurrency:
  group: replication-soak-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  soak:
    name: Soak (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Replication soak
        env:
          SIRANNON_SOAK_DURATION_MS: ${{ inputs.duration_ms || '600000' }}
        run: pnpm nx run sirannon-ts:test:soak
